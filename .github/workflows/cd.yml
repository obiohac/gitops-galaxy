name: CD (Build, Push, GitOps Update)

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Environment to update"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: write

jobs:
  build-push-and-update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sherlock-logs-frontend
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sherlock-logs-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve environment and tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_ENV="${{ github.event.inputs.target_env }}"
          else
            TARGET_ENV="dev"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.target_env }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.target_env }}

      - name: Update Helm values for target environment
        shell: bash
        env:
          VALUES_FILE: helm-charts/sherlock-app/values-${{ steps.vars.outputs.target_env }}.yaml
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          python -m pip install --quiet pyyaml
          python - << 'PY'
          import os
          import yaml
          from pathlib import Path

          values_file = Path(os.environ["VALUES_FILE"])
          tag = os.environ["IMAGE_TAG"]

          data = yaml.safe_load(values_file.read_text(encoding="utf-8"))
          data.setdefault("frontend", {}).setdefault("image", {})["tag"] = tag
          data.setdefault("backend", {}).setdefault("image", {})["tag"] = tag
          values_file.write_text(yaml.safe_dump(data, sort_keys=False), encoding="utf-8")
          PY

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push manifest update
        shell: bash
        run: |
          git add helm-charts/sherlock-app/values-${{ steps.vars.outputs.target_env }}.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "ci: update ${{ steps.vars.outputs.target_env }} image tags to ${{ steps.vars.outputs.image_tag }}"
          git push
