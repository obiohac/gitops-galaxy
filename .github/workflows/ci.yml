name: CI Build and Publish

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./src/frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sherlock-logs-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/sherlock-logs-frontend:${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./src/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sherlock-logs-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/sherlock-logs-backend:${{ github.sha }}

      - name: Update Helm values with new image tag and push
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Updating helm values files with new image repositories and tag"
          for f in helm-charts/sherlock-app/values*.yaml; do
            if [ -f "$f" ]; then
              sed -i "s|repository: .*sherlock-logs-frontend|repository: ${DOCKER_USER}/sherlock-logs-frontend|g" "$f" || true
              sed -i "s|repository: .*sherlock-logs-backend|repository: ${DOCKER_USER}/sherlock-logs-backend|g" "$f" || true
              sed -i "s|tag: .*|tag: ${TAG}|g" "$f" || true
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-charts/sherlock-app/values*.yaml || true
          git commit -m "ci: update image tags to ${TAG}" || echo "no changes to commit"
          git push

      - name: Create lightweight tag for this run
        run: |
          git tag -f "ci-${{ github.run_id }}" || true
          git push --tags --force || true
name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest -q src/backend/tests

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm-charts/sherlock-app

      - name: Helm render (dev)
        run: |
          helm template sherlock-app helm-charts/sherlock-app \
            -f helm-charts/sherlock-app/values.yaml \
            -f helm-charts/sherlock-app/values-dev.yaml >/dev/null

      - name: Helm render (staging)
        run: |
          helm template sherlock-app helm-charts/sherlock-app \
            -f helm-charts/sherlock-app/values.yaml \
            -f helm-charts/sherlock-app/values-staging.yaml >/dev/null

      - name: Helm render (prod)
        run: |
          helm template sherlock-app helm-charts/sherlock-app \
            -f helm-charts/sherlock-app/values.yaml \
            -f helm-charts/sherlock-app/values-prod.yaml >/dev/null
