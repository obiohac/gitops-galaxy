apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
spec:
  project: default
  source:
    # Replace this with your repository URL where this repo lives
    repoURL: 'https://github.com/obiohac/gitops-galaxy.git'
    path: argocd/image-updater
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd-image-updater
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
# application-image-updater.yaml
