apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: "15.x.x"
    helm:
      parameters:
        - name: auth.username
          value: postgres
        - name: auth.password
          value: postgres
        - name: auth.database
          value: sherlock
        - name: persistence.enabled
          value: "true"
        - name: persistence.size
          value: 10Gi
        - name: resources.requests.memory
          value: 512Mi
        - name: resources.limits.memory
          value: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true