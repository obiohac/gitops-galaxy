name: Deploy Dev

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Kubectl
      run: |
        sudo apt-get update
        sudo apt-get install -y kubectl

    - name: Deploy Helm
      run: |
        helm upgrade --install my-app ./helm/my-app-chart \
        -n dev -f helm/my-app-chart/values-dev.yaml