name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: 'v1.0.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository }}/sherlock-logs-frontend
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository }}/sherlock-logs-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        ref: ${{ github.ref }}

    - name: Set version from tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        echo "Building version: ${VERSION}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push frontend image (production)
      uses: docker/build-push-action@v4
      with:
        context: ./apps/frontend
        push: true
        tags: |
          ${{ env.IMAGE_NAME_FRONTEND }}:prod
          ${{ env.IMAGE_NAME_FRONTEND }}:${{ env.VERSION }}
          ${{ env.IMAGE_NAME_FRONTEND }}:latest
        cache-from: type=registry,ref=${{ env.IMAGE_NAME_FRONTEND }}:buildcache-prod
        cache-to: type=registry,ref=${{ env.IMAGE_NAME_FRONTEND }}:buildcache-prod,mode=max

    - name: Build and push backend image (production)
      uses: docker/build-push-action@v4
      with:
        context: ./apps/backend
        push: true
        tags: |
          ${{ env.IMAGE_NAME_BACKEND }}:prod
          ${{ env.IMAGE_NAME_BACKEND }}:${{ env.VERSION }}
          ${{ env.IMAGE_NAME_BACKEND }}:latest
        cache-from: type=registry,ref=${{ env.IMAGE_NAME_BACKEND }}:buildcache-prod
        cache-to: type=registry,ref=${{ env.IMAGE_NAME_BACKEND }}:buildcache-prod,mode=max

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME_FRONTEND }}:prod
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  update-helm-values:
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: production

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set version from tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=${VERSION}" >> $GITHUB_ENV

    - name: Set up yq
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq

    - name: Update Helm values with new image tags
      run: |
        yq eval '.frontend.image.tag = "prod"' -i helm/my-app-chart/values-prod.yaml
        yq eval '.frontend.image.tag = "${{ env.VERSION }}"' -i helm/my-app-chart/values-prod.yaml
        yq eval '.backend.image.tag = "prod"' -i helm/my-app-chart/values-prod.yaml
        yq eval '.backend.image.tag = "${{ env.VERSION }}"' -i helm/my-app-chart/values-prod.yaml

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add helm/my-app-chart/values-prod.yaml
        git commit -m "chore: update production image tags to ${{ env.VERSION }} [skip ci]"
        git push
      continue-on-error: true

  create-release:
    needs: update-helm-values
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body: |
          Production release ${{ github.ref_name }}

          ### Changes
          - Frontend: ${{ env.IMAGE_NAME_FRONTEND }}:${{ github.ref_name }}
          - Backend: ${{ env.IMAGE_NAME_BACKEND }}:${{ github.ref_name }}

          ### Deployment
          Run the production deployment via ArgoCD or GitOps

          ```bash
          kubectl patch application my-app-prod -n argocd --type=merge -p '{"spec":{"source":{"helm":{"values":"environment: production\n"}}}}'
          argocd app sync my-app-prod
          ```
        files: |
          helm/my-app-chart/values-prod.yaml
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-argocd:
    needs: create-release
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
    - name: Manual ArgoCD sync for production
      run: |
        echo "⚠️ Manual approval required for production ArgoCD sync"
        echo "Run this command when ready:"
        echo ""
        echo "kubectl -n argocd patch application my-app-prod --type=merge -p '{\"spec\":{\"syncPolicy\":{\"automated\":{\"prune\":true,\"selfHeal\":true}}}}'"
        echo "argocd app sync my-app-prod --prune"