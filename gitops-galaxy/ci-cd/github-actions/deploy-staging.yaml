name: Deploy to Staging

# Trigger on push to main branch
on:
  push:
    branches: [ main ]
    paths:
    - 'helm/**'
    - 'ci-cd/github-actions/deploy-staging.yaml'
  # Allow manual trigger
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository }}/sherlock-logs-frontend
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository }}/sherlock-logs-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    # Build and push frontend
    - name: Build and push frontend image (staging)
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ env.IMAGE_NAME_FRONTEND }}:staging
        cache-from: type=registry,ref=${{ env.IMAGE_NAME_FRONTEND }}:buildcache-staging
        cache-to: type=registry,ref=${{ env.IMAGE_NAME_FRONTEND }}:buildcache-staging,mode=max
    
    # Build and push backend
    - name: Build and push backend image (staging)
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ env.IMAGE_NAME_BACKEND }}:staging
        cache-from: type=registry,ref=${{ env.IMAGE_NAME_BACKEND }}:buildcache-staging
        cache-to: type=registry,ref=${{ env.IMAGE_NAME_BACKEND }}:buildcache-staging,mode=max
    
    - name: Image digest (frontend)
      run: echo ${{ steps.docker_build.outputs.digest }}

  update-helm-values:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up yq
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
    
    - name: Update Helm values with new image tags
      run: |
        # Update frontend image tag
        yq eval '.frontend.image.tag = "staging"' -i helm/my-app-chart/values-staging.yaml
        
        # Update backend image tag
        yq eval '.backend.image.tag = "staging"' -i helm/my-app-chart/values-staging.yaml
    
    - name: Commit and push changes
      if: github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add helm/my-app-chart/values-staging.yaml
        git commit -m "chore: update staging image tags [skip ci]"
        git push
      continue-on-error: true

  sync-argocd:
    needs: update-helm-values
    runs-on: ubuntu-latest
    
    steps:
    - name: Sync ArgoCD application
      run: |
        echo "Syncing staging application in ArgoCD"
        # This would typically use argocd CLI with API token
        # kubectl -n argocd exec -it argocd-application-controller -- argocd app sync my-app-staging
        echo "Application sync triggered"
      continue-on-error: true
    
    - name: Verify deployment
      run: |
        echo "Verifying staging deployment"
        # kubectl -n staging rollout status deployment/my-app-staging-frontend
        # kubectl -n staging rollout status deployment/my-app-staging-backend
        echo "Deployment verification skipped (requires kubectl access)"