{{- if .Values.backend.enabled }}
# Backend Deployment
# Deploys the Flask-based API backend with security and resilience features
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-app-chart.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "my-app-chart.labels" . | nindent 4 }}
    component: backend
spec:
  {{ if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{ end }}
  selector:
    matchLabels:
{{ include "my-app-chart.selectorLabels" . | nindent 6 }}
      component: backend
  
  # Pod template specification
  template:
    metadata:
      labels:
{{ include "my-app-chart.selectorLabels" . | nindent 8 }}
        component: backend
      annotations:
        # Trigger pod restart when ConfigMap or Secret changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "my-app-chart.serviceAccountName" . }}
      
      # Security context for pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        capabilities:
          drop:
            - ALL
      
      # Init container to wait for database
      initContainers:
      - name: wait-for-db
        image: "busybox:1.35"
        command: ['sh', '-c', 'until nc -z postgres.db-layer.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done']
      
      # Container specification
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        
        # Container ports
        ports:
        - name: http
          containerPort: {{ .Values.backend.service.targetPort }}
          protocol: TCP
        {{- if .Values.configMap.ENABLE_METRICS }}
        - name: metrics
          containerPort: 9090
          protocol: TCP
        {{- end }}
        
        # Startup probe - gives container 60 seconds to start
        {{- with .Values.backend.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- else }}
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        {{- end }}
        
        # Liveness probe
        {{- with .Values.backend.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        
        # Readiness probe
        {{- with .Values.backend.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        
        # Resource requests and limits
        resources:
          requests:
            memory: {{ .Values.backend.resources.requests.memory | quote }}
            cpu: {{ .Values.backend.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.backend.resources.limits.memory | quote }}
            cpu: {{ .Values.backend.resources.limits.cpu | quote }}
        
        # Environment variables
        env:
        - name: FLASK_ENV
          value: {{ .Values.configMap.ENVIRONMENT | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.configMap.LOG_LEVEL | quote }}
        - name: API_TIMEOUT
          value: {{ .Values.configMap.API_TIMEOUT | quote }}
        
        # Database connection
        - name: DATABASE_HOST
          value: "postgres.db-layer.svc.cluster.local"
        - name: DATABASE_PORT
          value: "5432"
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: {{ include "my-app-chart.postgresSecretName" . }}
              key: database
              optional: true
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "my-app-chart.postgresSecretName" . }}
              key: username
              optional: true
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "my-app-chart.postgresSecretName" . }}
              key: password
              optional: true
        
        # External Secrets
        {{- if .Values.externalSecrets.enabled }}
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "my-app-chart.secretName" . }}
              key: api-key
              optional: true
        {{- end }}
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /var/log/app
      
      # Pod volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
      
      # Pod anti-affinity to spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - {{ include "my-app-chart.name" . }}
                - key: component
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
      
      # Termination grace period for graceful shutdown
      terminationGracePeriodSeconds: 30
{{- end }}
