{{- if .Values.backend.enabled }}
# Backend Service
# Exposes the backend deployment for internal communication
apiVersion: v1
kind: Service
metadata:
  name: {{ include "my-app-chart.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "my-app-chart.labels" . | nindent 4 }}
    component: backend
spec:
  type: {{ .Values.backend.service.type }}
  
  # Port configuration
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  {{- if .Values.configMap.ENABLE_METRICS }}
  - port: 9090
    targetPort: metrics
    protocol: TCP
    name: metrics
  {{- end }}
  
  # Selector to route traffic to backend pods
  selector:
{{ include "my-app-chart.selectorLabels" . | nindent 4 }}
    component: backend
  
  # Session affinity
  sessionAffinity: None
{{- end }}
