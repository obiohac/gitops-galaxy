# ConfigMap
# Stores application configuration and Nginx server configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "my-app-chart.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "my-app-chart.labels" . | nindent 4 }}
data:
  # Application environment variables
  {{- range $key, $value := .Values.configMap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  
  # Nginx configuration for frontend server
  nginx.conf: |
    # Nginx server configuration
    server {
      listen 80;
      server_name _;
      
      # Access logs
      access_log /var/log/nginx/access.log;
      error_log /var/log/nginx/error.log warn;
      
      # Gzip compression
      gzip on;
      gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;
      gzip_min_length 1000;
      gzip_vary on;
      
      # Security headers
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      
      # Root location
      root /usr/share/nginx/html;
      index index.html;
      
      # Liveness probe endpoint
      location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type "text/plain";
      }
      
      # Readiness probe endpoint
      location /ready {
        access_log off;
        return 200 "OK";
        add_header Content-Type "text/plain";
      }
      
      # Main application routes
      location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
      }
      
      # API proxy to backend
      location /api/ {
        proxy_pass http://{{ include "my-app-chart.fullname" . }}-backend:{{ .Values.backend.service.port }}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }
      
      # Deny access to hidden files
      location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
      }
      
      # Deny access to backup files
      location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
      }
      
      # Return 404 for missing files
      error_page 404 /404.html;
      location = /404.html {
        internal;
      }
      
      # Return 500 for server errors
      error_page 500 502 503 504 /50x.html;
      location = /50x.html {
        internal;
      }
    }
