{{- if .Values.resourceQuota.enabled }}
# ResourceQuota
# Enforces resource limits per namespace for cost control and stability
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ include "my-app-chart.fullname" . }}-quota
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "my-app-chart.labels" . | nindent 4 }}
spec:
  hard:
    {{- with .Values.resourceQuota.hard }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  
  # Scope to only running pods (not failed/succeeded)
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values: ["default"]
{{- end }}
