{{- if not .Values.externalSecrets.enabled }}
# Kubernetes Secret
# Stores sensitive data (fallback when External Secrets is not enabled)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "my-app-chart.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "my-app-chart.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded secret values
  api-key: {{ .Values.secrets.apiKey | b64enc }}
  db-password: {{ .Values.secrets.dbPassword | b64enc }}
{{- end }}

{{- if .Values.externalSecrets.enabled }}
---
# ExternalSecret Resource
# Syncs secrets from HashiCorp Vault to Kubernetes Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "my-app-chart.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "my-app-chart.labels" . | nindent 4 }}
spec:
  # Refresh interval
  refreshInterval: 1h
  
  # Reference to SecretStore
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: ClusterSecretStore
  
  # Target Kubernetes Secret
  target:
    name: {{ include "my-app-chart.secretName" . }}
    creationPolicy: Owner
  
  # Data to fetch from Vault
  data:
  - secretKey: api-key
    remoteRef:
      key: {{ .Values.externalSecrets.secretPath }}/api-key
  - secretKey: db-password
    remoteRef:
      key: {{ .Values.externalSecrets.secretPath }}/db-password
{{- end }}
