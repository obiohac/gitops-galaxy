# Development Environment Values
# Override base values for development deployment
environment: development

# Frontend Configuration
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: "tumbaoka/sherlock-logs-frontend"
    tag: "dev"  # Will be updated by ArgoCD Image Updater
    pullPolicy: IfNotPresent
  
  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30080
  
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  
  startupProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 2
  
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"
    hosts:
      - host: "app-dev.example.com"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: app-dev-tls
        hosts:
          - app-dev.example.com

# Backend Configuration
backend:
  enabled: true
  replicaCount: 1
  image:
    repository: "tumbaoka/sherlock-logs-backend"
    tag: "dev"  # Will be updated by ArgoCD Image Updater
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 5000
    targetPort: 5000
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "1000m"
  
  startupProbe:
    httpGet:
      path: /health
      port: 5000
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  
  livenessProbe:
    httpGet:
      path: /health
      port: 5000
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /ready
      port: 5000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 2

# PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    username: "sherlock_dev"
    password: "dev-password"
    database: "sherlock_dev"
    existingSecret: "postgres-secret-dev"
    existingSecretPasswordKey: "password"
  
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: "local-path"