replicaCount: 2

serviceAccount:
  create: false
  name: ""

image:
  backend: nginx:1.25
  frontend: nginx:1.25

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  DB_HOST: postgres
  DB_PORT: "5432"

# External Secrets configuration
externalSecrets:
  enabled: false
  secretStore: vault-backend
  secretPath: secret/data/app

# Fallback secrets (used when externalSecrets.enabled is false)
secrets:
  apiKey: changeme
  dbPassword: changeme

# Horizontal Pod Autoscaler
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

# Resource Quota configuration
resourceQuota:
  enabled: false
  hard:
    requests.cpu: "4"
    limits.cpu: "8"
    pods: "30"
    deployments: "10"

# Frontend service configuration
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: nginx
    tag: 1.25
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30080
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 50
    targetMemoryUtilizationPercentage: 80

# Backend service configuration
backend:
  enabled: true
  replicaCount: 1
  image:
    repository: nginx
    tag: 1.25
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 2
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

# ConfigMap data for application configuration
configMap:
  LOG_LEVEL: "info"
  ENABLE_METRICS: "true"
  APP_ENV: "production"
  ENVIRONMENT: "production"
  API_TIMEOUT: "30"