# External Secrets - ClusterSecretStore for Vault Integration
# Allows External Secrets to sync secrets from HashiCorp Vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # Vault server address
      server: "http://vault.vault.svc.cluster.local:8200"
      
      # Path to KV secrets engine
      path: "secret"
      
      # Authentication method: Kubernetes auth
      auth:
        kubernetes:
          # Service account to use
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system

---
# External Secrets - ServiceAccount for Vault auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets-system

---
# Vault Kubernetes Auth Role
# This would typically be created by Vault admin
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-auth-role
  namespace: vault
data:
  role.json: |
    {
      "bound_service_account_names": ["external-secrets-sa"],
      "bound_service_account_namespaces": ["external-secrets-system"],
      "policies": ["external-secrets"],
      "ttl": "24h"
    }

---
# Vault Policy for External Secrets
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-policy-external-secrets
  namespace: vault
data:
  policy.hcl: |
    # Policy for external-secrets to read secrets
    path "secret/data/*" {
      capabilities = ["read", "list"]
    }
    path "secret/metadata/*" {
      capabilities = ["read", "list"]
    }

---
# ClusterSecretStore for Production Vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend-prod
spec:
  provider:
    vault:
      # Vault server address (with TLS for production)
      server: "https://vault.vault.svc.cluster.local:8200"
      
      # Path to KV v2 secrets engine
      path: "secret"
      
      # Skip TLS verification (only for development!)
      caBundle: ""
      
      # Authentication method
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets-prod"
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system
