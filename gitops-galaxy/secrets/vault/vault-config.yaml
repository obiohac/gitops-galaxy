# Vault Configuration
# HashiCorp Vault setup for storing application secrets
apiVersion: v1
kind: Namespace
metadata:
  name: vault
  labels:
    name: vault
---
# Vault ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: vault
---
# Vault ConfigMap for startup configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
data:
  vault.hcl: |
    # Vault Server Configuration
    ui = true
    disable_cache = false
    disable_mlock = false
    
    # Logging
    log_level = "info"
    
    # Kubernetes auth method
    auth "kubernetes" {
      path = "/"
    }
    
    # Storage backend
    storage "file" {
      path = "/vault/data"
    }
    
    # Listener configuration
    listener "tcp" {
      address       = "0.0.0.0:8200"
      tls_disable   = 1  # Set to 0 in production with proper certificates
      
      # CORS settings
      cors_allowed_headers = ["Content-Type", "X-Requested-With"]
    }
    
    # API configuration
    api_addr         = "http://0.0.0.0:8200"
    cluster_addr     = "https://0.0.0.0:8201"
    ui_addr          = "http://0.0.0.0:8200/ui"
    
    # Default lease durations
    default_lease_ttl = "168h"
    max_lease_ttl     = "720h"

---
# Vault StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      containers:
      - name: vault
        image: vault:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8200
          name: vault
        env:
        - name: VAULT_ADDR
          value: "http://localhost:8200"
        - name: VAULT_LOG_LEVEL
          value: "info"
        volumeMounts:
        - name: vault-config
          mountPath: /vault/config
        - name: vault-data
          mountPath: /vault/data
        - name: vault-logs
          mountPath: /vault/logs
        livenessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: vault-config
        configMap:
          name: vault-config
      - name: vault-logs
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: vault-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
# Vault Service
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
spec:
  selector:
    app: vault
  ports:
  - port: 8200
    targetPort: 8200
    protocol: TCP
    name: vault
  clusterIP: None  # Headless service for StatefulSet
  type: ClusterIP

---
# Vault UI Service (LoadBalancer for access)
apiVersion: v1
kind: Service
metadata:
  name: vault-ui
  namespace: vault
spec:
  selector:
    app: vault
  ports:
  - port: 8200
    targetPort: 8200
    protocol: TCP
  type: NodePort

---
# RBAC for Vault
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: vault
  namespace: vault