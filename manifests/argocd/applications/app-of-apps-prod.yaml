apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # App of apps pattern - manages other applications for production
  project: default

  source:
    repoURL: https://github.com/obiohac/gitops-galaxy
    targetRevision: HEAD
    path: manifests/argocd/applications
    directory:
      include: "*-prod.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: false  # Be conservative in production
      selfHeal: false

    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  info:
    - name: Pattern
      value: App of Apps
    - name: Description
      value: Production environment management
    - name: Environment
      value: Production
    - name: Repository
      value: https://github.com/obiohac/gitops-galaxy
