apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd-image-updater.argoproj.io/image-list: frontend=your-org/frontend
    argocd-image-updater.argoproj.io/frontend.update-strategy: semver:~1.0
    argocd-image-updater.argoproj.io/frontend.helm.image-name: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  # Project to use
  project: default

  # Source configuration - where to pull manifests from
  source:
    repoURL: https://github.com/obiohac/gitops-galaxy
    targetRevision: HEAD
    path: helm/my-app-chart

    # Helm-specific configuration
    helm:
      releaseName: frontend
      values: |
        replicaCount: 3
        image:
          repository: your-org/frontend
          tag: latest
      # Override with environment-specific values
      valueFiles:
      - values.yaml
      - values-prod.yaml

  # Destination configuration - where to deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  # Sync policy configuration
  syncPolicy:
    # Manual sync for production safety
    automated:
      prune: false
      selfHeal: false
      
    syncOptions:
    - Validate=true

    # Retry configuration
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  # Ignore differences
  ignoreDifferences:
    - group: "*"
      kind: Secret
      jsonPointers:
        - /data

  # Notification settings
  info:
    - name: GitHub
      value: https://github.com/obiohac/gitops-galaxy
    - name: Slack
      value: "#deployments"
    - name: Environment
      value: Production
