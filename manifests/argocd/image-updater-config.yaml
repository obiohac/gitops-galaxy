---
# ConfigMap for ArgoCD Image Updater Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
data:
  registries.conf: |
    registries:
    - name: Docker Hub
      api_url: https://registry-1.docker.io
      ping: yes
      credentials: secret:argocd/docker-credentials#creds
      default: yes
    
    - name: GitHub Container Registry
      api_url: https://ghcr.io
      ping: yes
      credentials: secret:argocd/ghcr-credentials#creds
    
    - name: Amazon ECR
      api_url: https://public.ecr.aws
      ping: yes
      default: no
    
    - name: Azure Container Registry
      api_url: https://myregistry.azurecr.io
      ping: yes
      credentials: secret:argocd/acr-credentials#creds
  
  git.commit.message: |
    chore: bump image versions
    
    Updated image versions for GitOps deployment
    Image: {{ .Image }}
    Old Tag: {{ .OldTag }}
    New Tag: {{ .NewTag }}
    
    Image Updater: ArgoCD
  
  # Image update strategy defaults
  update_strategy: "semver"
  
  # Log level configuration
  log.level: "info"
  
  # Metrics configuration
  metrics.port: "8081"

---
# Secret for Image Updater Git Access
apiVersion: v1
kind: Secret
metadata:
  name: argocd-image-updater-secret
  namespace: argocd
type: Opaque
stringData:
  git_token: "ghp_YOUR_GITHUB_TOKEN_HERE"
  ssh_private_key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    [Base64 encoded SSH private key for Git access]
    -----END OPENSSH PRIVATE KEY-----
  webhook_secret: "your_webhook_secret_here"

---
# Credentials for Docker registries
apiVersion: v1
kind: Secret
metadata:
  name: docker-credentials
  namespace: argocd
type: Opaque
stringData:
  creds: username:password

---
# Credentials for GitHub Container Registry
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-credentials
  namespace: argocd
type: Opaque
stringData:
  creds: github_username:github_token

---
# Credentials for Azure Container Registry
apiVersion: v1
kind: Secret
metadata:
  name: acr-credentials
  namespace: argocd
type: Opaque
stringData:
  creds: username:password

---
# ServiceAccount for ArgoCD Image Updater
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-image-updater
  namespace: argocd

---
# Role for ArgoCD Image Updater
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater
  namespace: argocd
rules:
- apiGroups:
  - argoproj.io
  resources:
  - applications
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch

---
# RoleBinding for ArgoCD Image Updater
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-image-updater
subjects:
- kind: ServiceAccount
  name: argocd-image-updater
  namespace: argocd
