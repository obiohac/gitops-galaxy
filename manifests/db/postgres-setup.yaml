---
# Namespace for Databases
apiVersion: v1
kind: Namespace
metadata:
  name: databases
  labels:
    environment: database

---
# PersistentVolume for PostgreSQL
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgresql-pv
  namespace: databases
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /data/postgresql

---
# PersistentVolumeClaim for PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-pvc
  namespace: databases
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
# Secret for PostgreSQL Credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: databases
type: Opaque
stringData:
  username: appuser
  password: SecurePassword123!
  root-password: PostgresPassword123!
  database: applicationdb

---
# ConfigMap for PostgreSQL Initialization
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: databases
data:
  init.sql: |
    CREATE USER appuser WITH PASSWORD 'SecurePassword123!';
    CREATE DATABASE applicationdb OWNER appuser;
    GRANT ALL PRIVILEGES ON DATABASE applicationdb TO appuser;
