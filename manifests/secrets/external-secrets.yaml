---
# Vault External Secret Store for Development
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-store
  namespace: development
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "app-role"
          serviceAccountRef:
            name: default

---
# Vault External Secret for Development
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: development
spec:
  secretStoreRef:
    name: vault-store
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
  - secretKey: database-username
    remoteRef:
      key: database/postgres
      property: username
  - secretKey: database-password
    remoteRef:
      key: database/postgres
      property: password
  - secretKey: jwt-secret
    remoteRef:
      key: application/api-keys
      property: jwt_secret
  - secretKey: api-key
    remoteRef:
      key: application/api-keys
      property: api_key

