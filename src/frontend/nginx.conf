server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Dedicated health/readiness probe endpoint.
    # No backend dependency — always returns 200 immediately.
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Frontend static app
    location / {
        add_header X-Served-By $hostname always;
        try_files $uri $uri/ =404;
    }

    # Reverse-proxy to backend.
    # Static proxy_pass works fine here — Kubernetes injects a working
    # /etc/resolv.conf in every pod so 'backend-service' resolves via
    # the cluster DNS without needing an explicit resolver directive.
    location /api/ {
        proxy_pass http://backend-service:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}